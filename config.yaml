# Swingbot — watchlist, risk, and strategy configuration

watchlist:
  - SPY
  - QQQ
  - AAPL
  - MSFT
  - NVDA

# Percent of account equity to risk per individual trade
risk_pct_per_trade: 1.0

# Strategy parameters — passed to strategy.evaluate()
strategy:
  sma_fast: 20         # Fast SMA period (days)
  sma_slow: 50         # Slow SMA period (days)
  atr_stop_mult: 1.5   # ATR multiplier for stop distance
  risk_reward: 2.0     # Take-profit distance as multiple of stop distance
